pre-commit:
  parallel: true
  commands:
    oxlint:
      glob: "*.{js,ts,jsx,tsx}"
      run: npx oxlint --fix {staged_files} || true
      stage_fixed: true
    oxfmt:
      glob: "*.{js,ts,jsx,tsx,json,css,html,yaml,yml,md}"
      exclude: "pnpm-lock.yaml"
      run: npx oxfmt {staged_files}
      stage_fixed: true
