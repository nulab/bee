name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]

    name: Test (Node ${{ matrix.node-version }})

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
        with:
          install_args: node@${{ matrix.node-version }}

      - run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm exec vitest run --coverage.enabled

      - name: Report coverage
        if: always() && github.event_name == 'pull_request' && matrix.node-version == 24
        uses: davelosert/vitest-coverage-report-action@v2

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm exec oxlint --ignore-pattern 'apps/docs' --max-warnings 0

      - name: Format check
        run: pnpm run format:check
