name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - "apps/cli/src/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0.6.4.0.0

      - run: pnpm install --frozen-lockfile

      - name: Restore Astro build cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: apps/docs/node_modules/.astro
          key: astro-build-${{ hashFiles('apps/docs/**', 'apps/cli/src/**') }}
          restore-keys: astro-build-

      - name: Build docs
        run: pnpm --filter @repo/docs build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/docs/dist
