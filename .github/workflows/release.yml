name: Release

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options:
          - dry-run
          - production
        description: Environment to publish package
        default: dry-run
        required: true
      newversion:
        type: choice
        options:
          - patch
          - minor
          - major
        description: New version
        default: patch
        required: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.bump_version.outputs.new_tag }}
      previous_tag: ${{ steps.get_latest_tag.outputs.latest_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4

      - run: pnpm install --frozen-lockfile

      - name: Get the latest tag
        id: get_latest_tag
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: bump_version
        working-directory: apps/cli
        env:
          LATEST_TAG: ${{ steps.get_latest_tag.outputs.latest_tag }}
          NEW_VERSION_TYPE: ${{ github.event.inputs.newversion }}
        run: |
          npm version "$LATEST_TAG" --no-git-tag-version --allow-same-version
          npm version "$NEW_VERSION_TYPE" --no-git-tag-version

          new_version=$(node -p "require('./package.json').version")
          new_tag="v${new_version}"

          echo "Created new tag: ${new_tag}"
          echo "new_tag=${new_tag}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: pnpm --filter @nulab/bee build

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cli-build
          path: |
            apps/cli/dist
            apps/cli/package.json

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: cli-build
          path: apps/cli

      - name: Publish to npm
        if: inputs.environment != 'dry-run'
        working-directory: apps/cli
        run: npm publish --provenance --access public

      - name: Publish dry run
        if: inputs.environment == 'dry-run'
        working-directory: apps/cli
        run: npm publish --provenance --access public --dry-run

      - name: Configure git
        if: inputs.environment != 'dry-run'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push version commit and tag
        if: inputs.environment != 'dry-run'
        env:
          NEW_TAG: ${{ needs.build.outputs.new_tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          git add apps/cli/package.json
          git commit -m "${NEW_TAG}"
          git tag "${NEW_TAG}"
          git push origin "HEAD:refs/heads/${REF_NAME}"
          git push origin "${NEW_TAG}"

      - name: Create GitHub release
        if: inputs.environment != 'dry-run'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ needs.build.outputs.new_tag }}
          PREVIOUS_TAG: ${{ needs.build.outputs.previous_tag }}
        run: gh release create "$NEW_TAG" --generate-notes --notes-start-tag "$PREVIOUS_TAG"

      - name: Preview release notes (dry-run)
        if: inputs.environment == 'dry-run'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ needs.build.outputs.new_tag }}
          PREVIOUS_TAG: ${{ needs.build.outputs.previous_tag }}
          REPOSITORY: ${{ github.repository }}
          TARGET_COMMITISH: ${{ github.sha }}
        run: |
          echo "## Release notes for ${NEW_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          gh api "repos/${REPOSITORY}/releases/generate-notes" \
            -f tag_name="$NEW_TAG" \
            -f target_commitish="$TARGET_COMMITISH" \
            -f previous_tag_name="$PREVIOUS_TAG" \
            --jq '.body' >> "$GITHUB_STEP_SUMMARY"
